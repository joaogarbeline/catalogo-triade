services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-triade}:${POSTGRES_PASSWORD:-triade}@db:5432/${POSTGRES_DB:-catalogo_triade}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-https://catalogo.performancetriade.com.br}
    volumes:
      - catalogo_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - catalogo_network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-triade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-triade}
      POSTGRES_DB: ${POSTGRES_DB:-catalogo_triade}
    volumes:
      - catalogo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triade} -d ${POSTGRES_DB:-catalogo_triade}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - catalogo_network

networks:
  catalogo_network:
    driver: bridge

volumes:
  catalogo_pgdata:
  catalogo_uploads:
